services:
  # Express API Backend
  - type: web
    name: ecolens-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true # Generates a secure random JWT secret automatically
      - key: GEMINI_API_KEY
        sync: false # Set in the Render Dashboard env section manually
